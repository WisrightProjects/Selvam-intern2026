<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid with @media query</title>
    <style>
        .parent{
            display: grid;
            grid-gap: 40px;
            grid-template-columns: 1fr;
        }
        @media screen and(min-width:768px){
            .parent{
                grid-template-columns: repeat(2,1fr);
            }
        }
        @media screen and (min-width:1024px){
            .parent{
                grid-template-columns: repeat(3,1fr)
            }
        }
        
        .box1{
            width: 400px;
            height: 20vh;
            background-color: red;
            gap: 20px;
            display: grid;
            grid-gap: 10px;
        }
        .box2{
             width: 400px;
             height: 20vh;
            background-color: yellow;
        }
        .box3{
             width: 400px;
            height: 20vh;
            background-color: rgb(255, 0, 208);
        }
    </style>
</head>
<body>
    <div class="parent">
     <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    </div>
</body>
</html>
